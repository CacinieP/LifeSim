name: Deploy to ModelScope

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to ModelScope Studio
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          if [ -z "$MODELSCOPE_TOKEN" ]; then
            echo "MODELSCOPE_TOKEN 未配置，跳过自动同步。"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          chmod +x start.sh
          git remote add modelscope "https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/Cacinie/LifeSim.git" || true
          git fetch modelscope master
          git push modelscope HEAD:master
          curl -s -X POST "https://modelscope.cn/openapi/v1/studios/Cacinie/LifeSim/deploy" \
            -H "Authorization: Bearer ${MODELSCOPE_TOKEN}" \
            -H "Content-Type: application/json"
